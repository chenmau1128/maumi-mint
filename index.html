<!DOCTYPE html>
<html lang="zh-TW" data-theme="dark">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MAUMI Dino Mint</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts 可愛圓潤字體 -->
    <link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <!-- ethers v6 CDN -->
    <script src="https://cdn.ethers.io/lib/ethers-5.7.umd.min.js" type="text/javascript"></script>
</head>
<body>

    <header>
        <nav>
            <div class="logo">MAUMI Dino</div>
            <div class="nav-links">
                <a href="#">Explore</a>
                <a href="#">About</a>
                <a href="#">Create</a>
            </div>
        </nav>
    </header>

    <main>
        <section class="hero">
            <div class="left">
                <h1>Mint Your<br>MAUMI Dino</h1>
                <p class="subtitle">台灣限定療癒恐龍 NFT<br>可愛冒險，從這裡開始 🦖✨</p>

                <div class="mint-box">
                    <button id="connectBtn" class="btn primary">Connect Wallet</button>
                    <button id="mintBtn" class="btn primary" disabled>Mint Now →</button>

                    <div class="progress-container">
                        <div class="progress-circle" id="progressCircle">0%</div>
                        <p>Minting Progress</p>
                    </div>

                    <p class="price">Price: 0.088 ETH <small>(Gas Fee Estimated)</small></p>
                    <p class="warning">You must have funds in wallet for gas.</p>
                </div>
            </div>

            <div class="right">
                <div class="card-preview">
                    <div class="circle-progress" id="nftCircle">
                        <!-- 這裡可以放你恐龍圖片 -->
                        <img src="https://via.placeholder.com/400x400/1a1a2e/89CFF0?text=MAUMI" alt="MAUMI Preview">
                    </div>
                    <div class="info">
                        <span>MAUMI #XXXX</span>
                        <span>0.088 ETH</span>
                    </div>
                </div>
            </div>
        </section>

        <!-- 你可以再加其他區塊，例如分類標籤 -->
        <section class="categories">
            <div>🦖 Art</div>
            <div>🧸 Collectibles</div>
            <div>🎮 Game Assets</div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
